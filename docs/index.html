<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React + GitHub Pages App</title>
    <!--
      SPA redirect decoder (works with the spa-github-pages 404.html trick).
      GitHub Pages has no server-side routing, so a hard refresh or deep link
      to e.g. /repo/about would 404. public/404.html encodes the path and
      redirects to index.html; this script decodes it back before React mounts.
      See public/404.html for the matching encoder.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
