<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!--
      spa-github-pages 404 redirect (https://github.com/rafgraph/spa-github-pages)
      GitHub Pages serves this file for any unknown path. It encodes the
      requested path into a query string and redirects to index.html, where
      the decoder script restores the real URL before React Router takes over.

      pathSegmentsToKeep = 1  -> keeps the leading "/<repo>/" segment,
      which is correct for a GitHub Pages *project* site served from /docs.
      Set it to 0 for a user/org site or a custom domain (base '/').
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
